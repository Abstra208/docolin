# Tiny standalone Cloudflare Worker that fires the docolin sync endpoint on
# a cron schedule. Lives outside the main Pages project because CF Pages
# Functions don't support cron triggers natively.
#
# Deploy:        bunx wrangler deploy -c workers/cron/wrangler.toml
# Set secret:    bunx wrangler secret put CRON_SECRET -c workers/cron/wrangler.toml
# Tail logs:     bunx wrangler tail -c workers/cron/wrangler.toml
# Test locally:  bunx wrangler dev -c workers/cron/wrangler.toml --test-scheduled
#                then GET http://localhost:8787/__scheduled to fire one tick

name = "docolin-cron"
main = "index.ts"
compatibility_date = "2026-05-17"

# Every 15 minutes. Each job drains a bounded batch within the tick's budget
# (e.g. embed-versions does up to 50 versions) and defers the rest to the next
# tick; most ticks are no-ops once content is steady.
[triggers]
crons = ["*/15 * * * *"]

[vars]
# Public origin of the docolin Pages deployment. Override per environment
# if you split prod/staging later. CRON_SECRET goes in via `wrangler secret put`,
# not here (secrets must not be in version-controlled config).
DOCOLIN_BASE_URL = "https://docolin.com"
